schema: spec-driven

context: |
  Tech stack: Vue 3 (Composition API, <script setup>), Vite 6, Tailwind CSS 3, PostCSS, Autoprefixer
  Architecture: Minimal SPA landing page — single-view, no router, no state management
  Testing: None detected — no test runner, no test scripts, no test files
  Style: ES modules, plain JS (no TypeScript), HSL CSS variables for theming
  Language: Spanish (es), Inter (sans) + Fraunces (serif) fonts

rules:
  proposal:
    - Include rollback plan for risky changes
    - Consider impact on Tailwind design tokens
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document component structure with atomic design principles
    - Note CSS variable dependencies when theming changes
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing Vue 3 Composition API patterns
    - Maintain Tailwind utility-first approach
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner: none
  framework: none
  unit: false
  integration: false
  e2e: false
  coverage: false
  linter: false
  type_checker: false
  formatter: false
